<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>estrella // patterns</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --card: #111;
    --border: #222;
    --text: #999;
    --accent: #fff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 40px 32px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 14px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  header .subtitle {
    color: #444;
    font-size: 12px;
  }

  .controls {
    margin-left: auto;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .controls label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .controls input[type="checkbox"] {
    appearance: none;
    width: 14px;
    height: 14px;
    border: 1px solid #444;
    background: transparent;
    cursor: pointer;
    position: relative;
  }

  .controls input[type="checkbox"]:checked {
    border-color: var(--accent);
  }

  .controls input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px; right: 2px; bottom: 2px;
    background: var(--accent);
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .card {
    background: var(--bg);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.2s;
  }

  .card:hover { background: #0e0e0e; }

  .card canvas {
    display: block;
    width: 100%;
    aspect-ratio: 576 / 400;
    image-rendering: pixelated;
  }

  .card .label {
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card .label .name {
    font-size: 12px;
    color: #ccc;
    letter-spacing: 0.04em;
  }

  /* expanded view */
  .expanded-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 16px;
  }

  .expanded-overlay.active { display: flex; }

  .expanded-overlay canvas {
    max-width: 90vw;
    max-height: 75vh;
    image-rendering: pixelated;
    border: 1px solid #222;
  }

  .expanded-overlay .info {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .expanded-overlay .info .name {
    font-size: 16px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .expanded-overlay .info .hint {
    font-size: 11px;
    color: #444;
  }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .speed-control input[type="range"] {
    width: 80px;
    height: 2px;
    appearance: none;
    background: #333;
    outline: none;
  }

  .speed-control input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 10px;
    height: 10px;
    background: #888;
    border-radius: 0;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <h1>estrella</h1>
  <span class="subtitle">animated pattern gallery</span>
  <div class="controls">
    <div class="speed-control">
      <span>speed</span>
      <input type="range" id="speed" min="0" max="3" step="0.1" value="1">
    </div>
    <label>
      <input type="checkbox" id="dither" checked>
      dither
    </label>
    <label>
      <input type="checkbox" id="invert-toggle">
      invert
    </label>
  </div>
</header>

<div class="gallery" id="gallery"></div>

<div class="expanded-overlay" id="overlay">
  <canvas id="expanded-canvas" width="576" height="400"></canvas>
  <div class="info">
    <span class="name" id="expanded-name"></span>
    <span class="hint">click anywhere to close</span>
  </div>
</div>

<script>
// ── shader primitives (ported from src/shader/) ─────────────────────

const TAU = Math.PI * 2;

function dist(x, y, cx, cy) {
  const dx = x - cx, dy = y - cy;
  return Math.sqrt(dx * dx + dy * dy);
}

function distChebyshev(x, y, cx, cy) {
  return Math.max(Math.abs(x - cx), Math.abs(y - cy));
}

function distFromCellCenter(coord, spacing) {
  const frac = ((coord / spacing) % 1 + 1) % 1;
  return Math.abs(frac - 0.5) * spacing;
}

function waveSin(coord, freq, phase) {
  return Math.sin(coord * freq + phase) * 0.5 + 0.5;
}

function waveCos(coord, freq, phase) {
  return Math.cos(coord * freq + phase) * 0.5 + 0.5;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function clamp01(v) { return v < 0 ? 0 : v > 1 ? 1 : v; }

function gamma(v, g) { return Math.pow(clamp01(v), g); }

function normalize(coord, size) { return (coord / size) * 2 - 1; }

function centerCoords(x, y, w, h) { return [x - w / 2, y - h / 2]; }

function aaEdge(d, halfThick, softness) {
  const edge = Math.abs(d) - halfThick;
  if (edge < -softness) return 1;
  if (edge > softness) return 0;
  return 1 - (edge + softness) / (2 * softness);
}

function rotateDeg(x, y, deg) {
  const a = deg * Math.PI / 180;
  const c = Math.cos(a), s = Math.sin(a);
  return [x * c - y * s, x * s + y * c];
}

// ── noise (ported from src/shader/noise.rs) ─────────────────────────

function hash(x) {
  x = Math.imul(x, 0x45d9f3b);
  x ^= x >>> 16;
  x = Math.imul(x, 0x45d9f3b);
  x ^= x >>> 16;
  return x >>> 0;
}

function hash2f32(x, y, seed) {
  const n = hash(
    (seed + Math.imul(x >>> 0, 374761393) + Math.imul(y >>> 0, 668265263)) >>> 0
  );
  return n / 0xFFFFFFFF;
}

function noise2d(x, y, seed) {
  const xi = Math.floor(x), yi = Math.floor(y);
  const xf = x - xi, yf = y - yi;
  const u = xf * xf * (3 - 2 * xf);
  const v = yf * yf * (3 - 2 * yf);
  const n00 = hash2f32(xi, yi, seed);
  const n10 = hash2f32(xi + 1, yi, seed);
  const n01 = hash2f32(xi, yi + 1, seed);
  const n11 = hash2f32(xi + 1, yi + 1, seed);
  const nx0 = n00 * (1 - u) + n10 * u;
  const nx1 = n01 * (1 - u) + n11 * u;
  return nx0 * (1 - v) + nx1 * v;
}

function fbm(x, y, octaves, seed) {
  let value = 0, amplitude = 0.5, frequency = 1, maxValue = 0;
  for (let i = 0; i < octaves; i++) {
    value += amplitude * noise2d(x * frequency, y * frequency, (seed + i * 1000) >>> 0);
    maxValue += amplitude;
    amplitude *= 0.5;
    frequency *= 2;
  }
  return value / maxValue;
}

// ── bayer 8x8 dithering (from src/render/dither.rs) ─────────────────

const BAYER8 = [
  [ 0, 32,  8, 40,  2, 34, 10, 42],
  [48, 16, 56, 24, 50, 18, 58, 26],
  [12, 44,  4, 36, 14, 46,  6, 38],
  [60, 28, 52, 20, 62, 30, 54, 22],
  [ 3, 35, 11, 43,  1, 33,  9, 41],
  [51, 19, 59, 27, 49, 17, 57, 25],
  [15, 47,  7, 39, 13, 45,  5, 37],
  [63, 31, 55, 23, 61, 29, 53, 21],
];

function bayerThreshold(x, y) {
  return (BAYER8[y & 7][x & 7] + 0.5) / 64;
}

// ── patterns ────────────────────────────────────────────────────────

const patterns = {

  ripple(x, y, w, h, t) {
    const cx = w * 0.5, cy = h * 0.5;
    const r = dist(x, y, cx, cy);
    const ripple = waveCos(r, 1 / 6.5, -y / 85 + t);
    const wobble = waveSin(x, 1 / 37, 0.7 * Math.cos(y / 53) + t * 0.4);
    return gamma(clamp01(lerp(ripple, wobble, 0.25)), 1.35);
  },

  waves(x, y, w, h, t) {
    const nx = normalize(x, w), ny = normalize(y, h);
    const r = dist(nx, ny, 0, 0);
    const horiz = Math.sin(x / 19 + 0.7 * Math.sin(y / 37) + t);
    const vert = Math.cos(y / 23 + 0.9 * Math.cos(x / 41) + t * 0.7);
    const radial = Math.cos(r * 24 - y / 29 + t * 0.5);
    const hn = 0.5 + 0.5 * horiz;
    const vn = 0.5 + 0.5 * vert;
    const rn = 0.5 + 0.5 * radial;
    return gamma(clamp01(0.45 * hn + 0.35 * vn + 0.20 * rn), 1.25);
  },

  plasma(x, y, w, h, t) {
    const cx = w * 0.35, cy = h * 0.2;
    const p = Math.sin(x / 11 + t)
            + Math.sin((x + y) / 19 + t * 0.7)
            + Math.cos(y / 13 + t * 0.5)
            + Math.sin(dist(x, y, cx, cy) / 9 + t * 1.3);
    return gamma(clamp01((p + 4) / 8), 1.2);
  },

  topography(x, y, w, h, t) {
    const s = Math.sin(x / 17 + t * 0.3)
            + Math.sin(y / 29 + t * 0.2)
            + Math.sin((x + y) / 41 + t * 0.15);
    const wrapped = s - Math.floor(s);
    const contours = Math.abs(wrapped - 0.5) * 2;
    return gamma(1 - contours, 2.2);
  },

  rings(x, y, w, h, t) {
    const [cx, cy] = centerCoords(x, y, w, h);
    const nx = cx / (w * 0.5), ny = cy / (h * 0.5);
    const r = dist(nx, ny, 0, 0);
    const rings = waveCos(r, 30, -y / 25 + t);
    const diag = waveSin(x - 2 * y, 1 / 23, t * 0.5);
    return gamma(clamp01(0.65 * rings + 0.35 * diag), 1.1);
  },

  tunnel(x, y, w, h, t) {
    const cx = w * 0.5, cy = h * 0.5;
    const dx = x - cx, dy = y - cy;
    const distance = distChebyshev(dx, dy, 0, 0);
    const maxDist = Math.max(w / 2, h / 2);
    const normDist = distance / maxDist;
    const persp = 0.3;
    const perspFactor = 1 - persp * (1 - normDist);
    const frameThick = 15, gapThick = 15;
    const period = (frameThick + gapThick) * perspFactor;
    if (period < 1) return 0.5;
    const pos = ((distance + t * 20) % period + period) % period;
    const effThick = frameThick * perspFactor;
    return pos < effThick ? 1 : 0;
  },

  moire(x, y, w, h, t) {
    const xf = x - w / 2, yf = y - h / 2;
    function lineGrid(px, py, spacing, angleDeg, thick) {
      const a = angleDeg * Math.PI / 180;
      const rotated = px * Math.cos(a) + py * Math.sin(a);
      const d = distFromCellCenter(rotated, spacing);
      return aaEdge(d, thick / 2, 1);
    }
    const g1 = lineGrid(xf, yf, 6, 0, 2);
    const g2 = lineGrid(xf, yf, 6.5, 3 + Math.sin(t * 0.3) * 4, 2);
    return clamp01((g1 + g2) / 2);
  },

  flowfield(x, y, w, h, t) {
    const scale = 0.008;
    const nx = x * scale, ny = y * scale;
    const angle = fbm(nx + t * 0.08, ny, 4, 42) * TAU;
    const turbX = fbm(nx * 2 + 100 + t * 0.05, ny * 2, 4, 542);
    const turbY = fbm(nx * 2 + t * 0.05, ny * 2 + 100, 4, 1042);
    const turb = 0.5;
    const flowX = x + Math.cos(angle) * 50 * turb + turbX * 30 * turb;
    const flowY = y + Math.sin(angle) * 50 * turb + turbY * 30 * turb;
    const lineAngle = angle + Math.PI / 2;
    const lineCoord = flowX * Math.cos(lineAngle) + flowY * Math.sin(lineAngle);
    const linePhase = Math.sin(lineCoord * 0.15);
    const lineValue = Math.tanh(linePhase * 3) * 0.5 + 0.5;
    const variation = fbm(nx * 3 + 200, ny * 3 + 200, 2, 2042);
    const finalVal = lineValue * (0.7 + variation * 0.3);
    const edgeX = Math.min(x / w, 1 - x / w) * 10;
    const edgeY = Math.min(y / h, 1 - y / h) * 10;
    const edgeFade = Math.min(Math.min(edgeX, edgeY), 1);
    return gamma(clamp01(finalVal * edgeFade), 1.2);
  },
};

// ── rendering engine ────────────────────────────────────────────────

const THUMB_W = 192, THUMB_H = 133;
const FULL_W = 576, FULL_H = 400;

let useDither = true;
let invertColors = false;
let speedMultiplier = 1;
let expandedPattern = null;
let time = 0;
let lastFrame = 0;

function renderPattern(ctx, name, fn, w, h, t) {
  const imgData = ctx.createImageData(w, h);
  const data = imgData.data;

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let intensity = fn(x, y, w, h, t);

      let pixel;
      if (useDither) {
        const threshold = bayerThreshold(x, y);
        pixel = intensity > threshold ? 1 : 0;
      } else {
        pixel = intensity;
      }

      if (invertColors) pixel = 1 - pixel;

      const v = pixel * 255;
      const i = (y * w + x) * 4;
      data[i] = v;
      data[i + 1] = v;
      data[i + 2] = v;
      data[i + 3] = 255;
    }
  }

  ctx.putImageData(imgData, 0, 0);
}

// ── ui setup ────────────────────────────────────────────────────────

const gallery = document.getElementById('gallery');
const overlay = document.getElementById('overlay');
const expandedCanvas = document.getElementById('expanded-canvas');
const expandedName = document.getElementById('expanded-name');
const expandedCtx = expandedCanvas.getContext('2d');

const cards = [];

for (const name of Object.keys(patterns)) {
  const card = document.createElement('div');
  card.className = 'card';

  const canvas = document.createElement('canvas');
  canvas.width = THUMB_W;
  canvas.height = THUMB_H;
  card.appendChild(canvas);

  const label = document.createElement('div');
  label.className = 'label';

  const nameSpan = document.createElement('span');
  nameSpan.className = 'name';
  nameSpan.textContent = name;
  label.appendChild(nameSpan);

  card.appendChild(label);

  card.addEventListener('click', () => {
    expandedPattern = name;
    expandedName.textContent = name;
    overlay.classList.add('active');
  });

  gallery.appendChild(card);
  cards.push({ name, canvas, ctx: canvas.getContext('2d') });
}

overlay.addEventListener('click', () => {
  overlay.classList.remove('active');
  expandedPattern = null;
});

// controls
document.getElementById('dither').addEventListener('change', e => { useDither = e.target.checked; });
document.getElementById('invert-toggle').addEventListener('change', e => { invertColors = e.target.checked; });
document.getElementById('speed').addEventListener('input', e => { speedMultiplier = parseFloat(e.target.value); });

// ── animation loop ──────────────────────────────────────────────────

let frameCount = 0;

function frame(now) {
  const dt = lastFrame ? (now - lastFrame) / 1000 : 0.016;
  lastFrame = now;
  time += dt * speedMultiplier;

  // render thumbnails (stagger: one per frame for perf)
  const idx = frameCount % cards.length;
  const c = cards[idx];
  renderPattern(c.ctx, c.name, patterns[c.name], THUMB_W, THUMB_H, time);
  frameCount++;

  // render expanded if open
  if (expandedPattern && patterns[expandedPattern]) {
    renderPattern(expandedCtx, expandedPattern, patterns[expandedPattern], FULL_W, FULL_H, time);
  }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
